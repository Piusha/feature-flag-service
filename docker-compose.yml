services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
    command: >
      sh -c "if [ ! -f vendor/autoload.php ]; then composer install; fi &&
             php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             (php artisan storage:link || true) &&
             php artisan serve --host=0.0.0.0 --port=8000"
    expose:
      - "8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: app_db
      DB_USERNAME: app_user
      DB_PASSWORD: app_pass
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_QUEUE_CONNECTION: default
      REDIS_QUEUE: event-logs
      REDIS_QUEUE_RETRY_AFTER: 120
      REDIS_QUEUE_AFTER_COMMIT: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FEATURE_FLAGS_CACHE_TTL: 60
      FEATURE_FLAGS_DEFAULT_ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  queue-worker:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: laravel-queue-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - vendor_data:/var/www/vendor
    command: >
      sh -c "if [ ! -f vendor/autoload.php ]; then composer install; fi &&
             php artisan queue:work redis --queue=event-logs,default --sleep=1 --tries=3 --timeout=90"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: app_db
      DB_USERNAME: app_user
      DB_PASSWORD: app_pass
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_QUEUE_CONNECTION: default
      REDIS_QUEUE: event-logs
      REDIS_QUEUE_RETRY_AFTER: 120
      REDIS_QUEUE_AFTER_COMMIT: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FEATURE_FLAGS_CACHE_TTL: 60
      FEATURE_FLAGS_DEFAULT_ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  vendor_data:
